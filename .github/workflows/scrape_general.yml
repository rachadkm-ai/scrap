name: Scraping FHF General (Manuel)

on:
  workflow_dispatch:
    # Ce script ne se lance que manuellement

permissions:
  contents: write

jobs:
  scrape-general:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: 🐍 Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 📦 Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 🌐 Installation du navigateur Playwright
        run: |
          python -m playwright install --with-deps chromium

      - name: 🚀 Lancement du scraping Général
        run: |
          python scraper_fhf_v2.py

      - name: 💾 Sauvegarde des résultats sur GitHub
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add fhf_etablissements.xlsx fhf_etablissements.json fhf_etablissements.csv
          git commit -m "Mise à jour des données générales 🔄" || echo "Aucune modification à commit"
          git pull --rebase || echo "Pas de changements distants à puller"
          git push
